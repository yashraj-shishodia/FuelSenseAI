<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>FuelPilot AI</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css">

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="dashboard">

    <!-- ========================= -->
    <!-- LEFT PANEL (20%) -->
    <!-- ========================= -->

    <aside class="left-panel">

        <div class="logo-section">

            <h1>⛽ FuelPilot AI</h1>

            <p>AI Powered Fuel Station Recommendation</p>

        </div>

        <div class="search-card">

            <input
                type="text"
                id="locationInput"
                placeholder="Search City or Landmark">

            <button onclick="searchLocation()">
                🔍 Search
            </button>

            <button onclick="getCurrentLocation()">
                📍 My Location
            </button>

            <label>
                Prediction Date
            </label>

            <input
                type="date"
                id="predictionDate">

            <label>
                Prediction Time
            </label>

            <input
                type="time"
                id="predictionTime">

            <div id="result" class="coordinates-card">
    Latitude : --
    <br>
    Longitude : --
</div>

        </div>

        <div class="recommended-section">

            <h2>
                ⭐ Recommended Station
            </h2>

            <!-- Recommended station will be inserted here -->

            <div id="recommendedStation">

                <p style="color:gray;">
                    Search a location to view recommendation
                </p>

            </div>

        </div>

    </aside>


    <!-- ========================= -->
    <!-- MAP (60%) -->
    <!-- ========================= -->

    <main class="map-panel">

        <div id="map"></div>

    </main>


    <!-- ========================= -->
    <!-- RIGHT PANEL (20%) -->
    <!-- ========================= -->

    <aside class="right-panel">

        <h2>Nearby Stations</h2>

        <div id="stationList">

            <p style="color:gray;">
                Nearby stations will appear here.
            </p>

        </div>

    </aside>

</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="{{ url_for('static', filename='js/location.js') }}"></script>

<script src="{{ url_for('static', filename='js/search.js') }}"></script>

<script src="{{ url_for('static', filename='js/stations.js') }}"></script>

</body>

</html>
